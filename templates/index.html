<!DOCTYPE html>
<html>
<head>
    <title>Network Traffic Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h1>⚡ Network Monitor Dashboard</h1>

<div class="dashboard">

    
    <div class="panel cards">
        <div class="card"><p>Upload</p><h2 id="upload">0 KB/s</h2></div>
        <div class="card"><p>Download</p><h2 id="download">0 KB/s</h2></div>
        <div class="card"><p>IP</p><h2 id="ip">--</h2></div>
        <div class="card"><p>Connections</p><h2 id="connections">--</h2></div>
        <div class="card"><p>TCP</p><h2 id="tcp">--</h2></div>
        <div class="card"><p>UDP</p><h2 id="udp">--</h2></div>
    </div>

  
    <div class="panel">
        <canvas id="chart"></canvas>
    </div>

    
    <div class="panel">
        <canvas id="pieChart"></canvas>
    </div>

    
    <div class="panel scroll">
        <h3>📱 Top Applications</h3>
        <ul id="apps"></ul>

        <h3>📜 Data History</h3>
        <ul id="history"></ul>
    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
